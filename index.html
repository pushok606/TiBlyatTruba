<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ТЫ ТРУБА БЛЯТЬ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: url('bg.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .phone {
            width: 360px;
            max-width: 100%;
            background: #FF0000;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
            height: 680px;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #000000;
            color: #FF0000;
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
            text-shadow: 0 0 8px #FF0000, 0 0 15px #FF0000;
        }

        .hamburger {
            font-size: 32px;
            background: none;
            border: none;
            color: #FF0000;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
            text-shadow: 0 0 6px #FF0000;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            flex: 1;
            text-transform: uppercase;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 28px;
            background: #FF0000;
        }

        .toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s ease;
        }
        .toggle-btn:active {
            transform: scale(0.94);
        }
        .toggle-btn img {
            width: 180px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 8px #39FF14);
            transition: opacity 0.25s ease;
        }

        .status {
            font-size: 22px;
            font-weight: 600;
            color: #FF0000;
            text-shadow: 0 0 8px #39FF14, 0 0 18px #39FF14;
            text-transform: lowercase;
            text-align: center;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }

        .flag-img {
            width: 130px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 12px #FF0000, 0 4px 12px rgba(0,0,0,0.3);
            border: 1px solid #FF0000;
            transition: opacity 0.25s ease;
        }

        .drawer {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #000000;
            color: #39FF14;
            z-index: 10;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.6);
        }
        .drawer.open {
            transform: translateX(0);
        }

        .drawer-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 16px;
            gap: 10px;
        }

        .drawer-item {
            background: none;
            border: none;
            color: #FF0000;
            font-size: 19px;
            padding: 14px 0;
            text-align: left;
            cursor: pointer;
            border-bottom: 1px solid rgba(57, 255, 20, 0.25);
            width: 100%;
            font-weight: 600;
            text-shadow: 0 0 6px #FF0000;
            transition: background 0.2s, text-shadow 0.2s;
        }
        .drawer-item:active {
            background: rgba(57, 255, 20, 0.15);
            text-shadow: 0 0 14px #39FF14;
        }

        .drawer-footer {
            padding: 18px 16px;
            font-size: 14px;
            opacity: 0.95;
            border-top: 1px solid rgba(57, 255, 20, 0.4);
            margin-top: auto;
            color: #ffffff;
            text-shadow: 0 0 5px #0000FF;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 5;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .overlay.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>
    <div class="phone">
        <!-- Header -->
        <div class="header">
            <button class="hamburger" id="hamburgerBtn" aria-label="Открыть меню">&#9776;</button>
            <span class="title">ТЫ ТРУБА БЛЯТЬ</span>
        </div>
        <iframe width="200" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

        <!-- Main content -->
        <div class="content">
            <!-- Toggle button с изображением -->
            <button class="toggle-btn" id="vpnToggleBtn">
                <img id="toggleImage" src="ButtonDisableVPN.png" alt="VPN выключено">
            </button>

            <!-- Статус VPN -->
            <span class="status" id="statusText">выключено</span>

            <!-- Флаг -->
            <img class="flag-img" id="flagImage" src="Russia.png" alt="Флаг России">
        </div>

        <!-- Navigation Drawer -->
        <div class="drawer" id="drawer">
            <div class="drawer-menu">
                <button class="drawer-item" id="settingsBtn">Настройки</button>
                <button class="drawer-item" id="premiumBtn">BLYAD SUKA PREMIUM+ VPN SUBSCRIBE</button>
            </div>
            <div class="drawer-footer">
                по вопросам писать в дискорд @pushokk0
            </div>
        </div>

        <!-- Overlay -->
        <div class="overlay" id="overlay"></div>
    </div>

    <script>
        (function() {
            // State
            let vpnEnabled = false;

            // DOM elements
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('overlay');
            const toggleBtn = document.getElementById('vpnToggleBtn');
            const toggleImage = document.getElementById('toggleImage');
            const statusText = document.getElementById('statusText');
            const flagImage = document.getElementById('flagImage');
            const settingsBtn = document.getElementById('settingsBtn');
            const premiumBtn = document.getElementById('premiumBtn');

            // Smooth image swap
            function switchImages(vpnOn) {
                toggleImage.style.opacity = '0';
                flagImage.style.opacity = '0';

                setTimeout(() => {
                    if (vpnOn) {
                        toggleImage.src = 'ButtonEnableVPN.png';
                        toggleImage.alt = 'VPN включено';
                        flagImage.src = 'Germany.png';
                        flagImage.alt = 'Флаг Германии';
                    } else {
                        toggleImage.src = 'ButtonDisableVPN.png';
                        toggleImage.alt = 'VPN выключено';
                        flagImage.src = 'Russia.png';
                        flagImage.alt = 'Флаг России';
                    }

                    void toggleImage.offsetWidth;
                    void flagImage.offsetWidth;

                    toggleImage.style.opacity = '1';
                    flagImage.style.opacity = '1';
                }, 250);
            }

            function updateUI() {
                if (vpnEnabled) {
                    statusText.textContent = 'регион германия (включено)';
                } else {
                    statusText.textContent = 'выключено';
                }
                switchImages(vpnEnabled);
            }

            // Toggle VPN state
            toggleBtn.addEventListener('click', () => {
                vpnEnabled = !vpnEnabled;
                updateUI();
            });

            // Drawer controls
            function openDrawer() {
                drawer.classList.add('open');
                overlay.classList.add('show');
            }

            function closeDrawer() {
                drawer.classList.remove('open');
                overlay.classList.remove('show');
            }

            hamburgerBtn.addEventListener('click', openDrawer);
            overlay.addEventListener('click', closeDrawer);

            // Drawer menu items
            settingsBtn.addEventListener('click', () => {
                closeDrawer();
                alert('⚙️ Настройки пока недоступны. Это же шутка.');
            });

            premiumBtn.addEventListener('click', () => {
                closeDrawer();
                alert('🥳 Subscription activated! Just kidding.\n(Подписка активирована! Шучу.)');
            });

            // Close drawer on Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && drawer.classList.contains('open')) {
                    closeDrawer();
                }
            });

            // Ensure images start fully opaque
            toggleImage.style.opacity = '1';
            flagImage.style.opacity = '1';
            updateUI();

            // === Сохранение IP посетителя ===
            fetch('save_ip.php')
                .then(response => response.json())
                .then(data => {
                    console.log('IP log:', data);
                })
                .catch(error => {
                    console.error('Ошибка при сохранении IP:', error);
                });
        })();
    </script>
</body>
</html>
